<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AZHAR-AI | Executive Intelligence Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

<style>

/* =========================
   RESPONSIVE FIXES
========================= */

html,
body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  scroll-behavior: smooth;
}

/* MAIN LAYOUT */
main {
  position: relative;
  z-index: 5;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 20px 80px;
}

/* HERO */
.hero {
  width: 100%;
  text-align: center;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(42px, 7vw, 72px);
  line-height: 1.1;
  word-break: break-word;
  overflow-wrap: break-word;
}

.hero-desc {
  max-width: 700px;
  margin: 0 auto;
  line-height: 1.8;
  overflow-wrap: break-word;
}

/* CARDS */
.card {
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

.card h3,
.card p,
.output-body,
.chat-bubble,
.dispatch-status-text {
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: normal;
}

/* TEXTAREA */
textarea {
  width: 100%;
  max-width: 100%;
  min-height: 120px;
  resize: vertical;
  line-height: 1.7;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  word-break: break-word;
}

/* NAVIGATION */
.nav-tabs {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  width: 100%;
}

.nav-tab {
  min-width: 0;
  padding: 14px 6px;
  font-size: 10px;
}

/* OUTPUT WINDOWS */
.output-wrap,
.diff-wrap,
.chat-window {
  width: 100%;
  max-width: 100%;
  overflow-x: auto;
}

/* CHAT INPUT */
.chat-input-row {
  width: 100%;
  flex-wrap: wrap;
}

.chat-textarea {
  flex: 1;
  min-width: 0;
}

/* DISPATCH SUMMARY */
.dispatch-summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
}

/* BUTTONS */
.btn-primary,
.btn-download {
  width: 100%;
}

/* TABLE SAFETY */
table {
  width: 100%;
  display: block;
  overflow-x: auto;
}

/* MOBILE */
@media (max-width: 768px) {

  header {
    padding: 0 14px;
    height: auto;
    min-height: 70px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .header-left {
    gap: 12px;
  }

  .brand-name {
    font-size: 18px;
    letter-spacing: 2px;
  }

  .brand-sub {
    font-size: 8px;
  }

  .hero {
    margin-bottom: 40px;
  }

  .hero-title {
    font-size: 42px;
  }

  .hero-desc {
    font-size: 12px;
    padding: 0 10px;
  }

  main {
    padding: 30px 14px 60px;
  }

  .card {
    padding: 22px;
  }

  .card h3 {
    font-size: 24px;
  }

  .nav-tabs {
    grid-template-columns: repeat(2, 1fr);
  }

  .dispatch-summary {
    grid-template-columns: 1fr;
  }

  .chat-bubble {
    max-width: 90%;
  }

  .chat-send-btn {
    width: 100%;
  }

  .quick-questions {
    flex-direction: column;
  }

  .quick-btn {
    width: 100%;
  }
}

/* EXTRA SMALL */
@media (max-width: 480px) {

  .hero-title {
    font-size: 34px;
  }

  .card {
    padding: 18px;
  }

  .nav-tabs {
    grid-template-columns: 1fr;
  }

  .brand-name {
    font-size: 16px;
  }
}
