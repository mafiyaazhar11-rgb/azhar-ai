<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AKI HoReCa Orders</title>
<style>
  :root{
    --gold:#d4af37; --gold-dark:#b8942e; --gold-light:#f0c75e;
    --bg:#181310; --card:#241d15; --card2:#2d251a;
    --border:rgba(212,175,55,0.22); --border-soft:rgba(212,175,55,0.14);
    --text:#f6ecd9; --muted:#b9a98d; --danger:#e5484d; --ok:#2ecc71;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:radial-gradient(ellipse at top, #201810, var(--bg) 55%); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding-bottom:70px; min-height:100vh;}
  header{position:sticky; top:0; background:linear-gradient(135deg,#241d15,#181310); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; justify-content:space-between; align-items:center; z-index:10;}
  header h1{font-size:18px; margin:0; color:var(--gold-light); letter-spacing:.5px; display:flex; align-items:center; gap:6px;}
  header .user{font-size:12px; color:var(--muted);}
  .tabs{display:flex; position:sticky; top:53px; background:var(--bg); z-index:9; border-bottom:1px solid var(--border-soft);}
  .tab{flex:1; text-align:center; padding:12px 0; font-size:13px; color:var(--muted); border-bottom:2px solid transparent;}
  .tab.active{color:var(--gold-light); border-color:var(--gold); font-weight:600;}
  .screen{display:none; padding:16px;}
  .screen.active{display:block;}
  .card{background:linear-gradient(160deg, var(--card), #1d1710); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:0 4px 18px rgba(0,0,0,0.25);}
  .card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .card-head .title{display:flex; align-items:center; gap:8px; font-size:14px; font-weight:700; color:var(--gold-light);}
  .card-head .count{font-size:11px; color:var(--muted); background:var(--card2); border:1px solid var(--border-soft); padding:3px 9px; border-radius:20px;}
  label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; margin-top:12px;}
  label:first-child{margin-top:0;}
  select, input{width:100%; padding:12px; border-radius:9px; border:1px solid var(--border-soft); background:var(--card2); color:var(--text); font-size:15px;}
  select:focus, input:focus{outline:none; border-color:var(--gold);}
  select:disabled, input:disabled{opacity:.75;}
  button{cursor:pointer; border:none; border-radius:9px; font-weight:600; font-size:14px;}
  .btn-primary{background:linear-gradient(135deg,var(--gold-light),var(--gold-dark)); color:#1d1710; padding:15px; width:100%; margin-top:16px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:15px; box-shadow:0 4px 16px rgba(212,175,55,0.25);}
  .btn-primary:disabled{opacity:.4;}
  .btn-secondary{background:var(--card2); color:var(--gold-light); border:1px solid var(--border); padding:10px 14px;}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger); padding:6px 10px; font-size:12px;}
  .line-item{display:flex; flex-direction:column; gap:8px; background:var(--card2); border:1px solid var(--border-soft); border-radius:11px; padding:10px; margin-bottom:8px;}
  .line-row{display:flex; gap:8px; align-items:flex-end;}
  .line-field{flex:1; position:relative; min-width:0;}
  .line-field.field-qty{flex:0 0 72px;}
  .line-field.field-uom{flex:0 0 76px;}
  .mini-label{font-size:10px; color:var(--muted); margin-bottom:4px; display:block;}
  .item-result{padding:10px; border-bottom:1px solid var(--border-soft); font-size:13px;}
  .item-result b{color:var(--gold-light);}
  .badge{display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;}
  .badge.pending{background:#3a2f10; color:#e0b73f;}
  .badge.approved{background:#123a2a; color:#37c98a;}
  .badge.sent{background:#0f2a3a; color:#4db8e5;}
  .order-card{position:relative; overflow:hidden; background:var(--card); border:1px solid var(--border-soft); border-radius:12px; padding:14px; margin-bottom:10px; transition:box-shadow .3s, border-color .3s;}
  .order-card.dispatched{border-color:#d4af37; box-shadow:0 0 16px rgba(212,175,55,0.4), inset 0 0 24px rgba(212,175,55,0.08); background:linear-gradient(135deg, rgba(212,175,55,0.06), var(--card) 60%);}
  .order-card.backlog{border-color:#e0b73f; box-shadow:0 0 12px rgba(224,183,63,0.28), inset 0 0 20px rgba(224,183,63,0.06); background:linear-gradient(135deg, rgba(224,183,63,0.05), var(--card) 60%);}
  .order-card.processing{border-color:#e0453a; box-shadow:0 0 16px rgba(224,69,58,0.35), inset 0 0 24px rgba(224,69,58,0.07); background:linear-gradient(135deg, rgba(224,69,58,0.06), var(--card) 60%);}
  .order-card.dispatched::after, .order-card.backlog::after, .order-card.processing::after{
    content:''; position:absolute; top:0; left:-150%; width:55%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.16), transparent);
    transform:skewX(-20deg); animation:shineSweep 3.2s ease-in-out infinite; pointer-events:none;
  }
  @keyframes shineSweep{ 0%{left:-150%;} 55%{left:150%;} 100%{left:150%;} }
  .badge.dispatched{background:#123a2a; color:#ffd75e; text-shadow:0 0 6px rgba(255,215,94,0.6);}
  .badge.backlog{background:#3a2f10; color:#ffd75e; text-shadow:0 0 6px rgba(255,215,94,0.5);}
  .badge.processing{background:#3a1210; color:#ff8a7a; text-shadow:0 0 6px rgba(255,90,70,0.5);}
  .order-card .top{display:flex; justify-content:space-between; margin-bottom:6px;}
  .order-card .ref{font-weight:700; color:var(--gold);}
  .order-card .meta{font-size:12px; color:var(--muted); margin-bottom:8px;}
  .order-card .line{font-size:13px; color:var(--text); padding:2px 0;}
  .login-wrap{display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px;}
  .empty{text-align:center; color:var(--muted); padding:40px 0; font-size:14px;}
  .notif-dot{position:absolute; top:8px; right:8px; width:8px; height:8px; border-radius:50%; background:var(--danger);}
  .toast{position:fixed; bottom:80px; left:16px; right:16px; background:var(--gold); color:#1a1a1a; padding:12px 16px; border-radius:10px; font-size:14px; font-weight:600; text-align:center; z-index:100;}
</style>
</head>
<body>

<div id="loginScreen" class="login-wrap">
  <div class="card" style="width:100%; max-width:360px;">
    <h1 style="color:var(--gold-light); text-align:center; margin-bottom:4px;">👑 AKI HoReCa</h1>
    <div style="text-align:center; color:var(--muted); font-size:12px; margin-bottom:20px;">Sales Order Entry</div>
    <label>Username</label>
    <input id="loginUser" autocomplete="username">
    <label>Password</label>
    <input id="loginPass" type="password" autocomplete="current-password">
    <div id="loginError" style="color:var(--danger); font-size:13px; margin-top:10px;"></div>
    <button class="btn-primary" onclick="doLogin()">Log In</button>
  </div>
</div>

<div id="appShell" style="display:none;">
  <header>
    <h1>👑 AKI HoReCa</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="position:relative; cursor:pointer; font-size:20px;" onclick="showTab('notif')">🔔<span id="notifDotHeader" class="notif-dot" style="display:none;"></span></div>
      <div style="text-align:right;">
        <div class="user" id="userLabel"></div>
        <button class="btn-secondary" style="margin-top:4px; padding:4px 10px; font-size:11px;" onclick="doLogout()">Log out</button>
      </div>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" data-tab="new" onclick="showTab('new')">New Order</div>
    <div class="tab" data-tab="status" onclick="showTab('status')">My Orders</div>
    <div class="tab" data-tab="dispatch" onclick="showTab('dispatch')">Dispatch</div>
    <div class="tab" data-tab="notif" onclick="showTab('notif')" style="position:relative;">Alerts<span id="notifDot" class="notif-dot" style="display:none;"></span></div>
  </div>

  <!-- NEW ORDER -->
  <div class="screen active" id="screen-new">
    <div class="card">
      <div class="card-head"><div class="title">📋 Order Details</div></div>
      <label style="margin-top:0;">W/H</label>
      <input id="whCode" value="DCF" disabled>

      <label>Customer</label>
      <div style="position:relative;">
        <input id="custSearch" placeholder="Search customer name..." autocomplete="off" oninput="filterCustomers(this.value)" onfocus="filterCustomers(this.value)">
        <input type="hidden" id="custSelectedIdx">
        <div id="custResults" style="position:absolute; background:var(--card2); border:1px solid var(--border); width:100%; z-index:25; max-height:220px; overflow:auto; border-radius:9px; display:none;"></div>
      </div>

      <div id="siteWrap" style="display:none;">
        <label>Location</label>
        <div style="position:relative;">
          <input id="siteSearch" placeholder="Search location..." autocomplete="off" oninput="filterSites(this.value)" onfocus="filterSites(this.value)">
          <input type="hidden" id="siteSelectedIdx">
          <div id="siteResults" style="position:absolute; background:var(--card2); border:1px solid var(--border); width:100%; z-index:20; max-height:180px; overflow:auto; border-radius:9px; display:none;"></div>
        </div>
      </div>

      <label>Salesperson</label>
      <input id="spName" disabled>

      <label>PO Number (optional)</label>
      <input id="poNumber" placeholder="Customer PO number">
    </div>

    <div class="card">
      <div class="card-head"><div class="title">📦 Order Lines</div><div class="count" id="lineCounter">0 / 15</div></div>
      <div id="lineList"></div>
      <button class="btn-secondary" style="width:100%; margin-top:8px;" onclick="addLine()">+ Add Line</button>
    </div>


    <div id="orderMsg" style="color:var(--danger); font-size:13px; margin-bottom:6px;"></div>
    <button class="btn-primary" id="submitBtn" onclick="submitOrder()">🛒 Submit Order</button>
  </div>

  <!-- MY ORDERS -->
  <div class="screen" id="screen-status">
    <div id="ordersList"></div>
  </div>

  <!-- DISPATCH STATUS -->
  <div class="screen" id="screen-dispatch">
    <div style="color:var(--muted); font-size:11px; margin-bottom:10px;">Showing your orders from the last 7 days</div>
    <div id="dispatchList"></div>
  </div>

  <!-- NOTIFICATIONS -->
  <div class="screen" id="screen-notif">
    <div id="notifList"></div>
  </div>
</div>

<div id="toast" class="toast" style="display:none;"></div>

<script>
let TOKEN = localStorage.getItem('horeca_token') || null;
let USER = JSON.parse(localStorage.getItem('horeca_user') || 'null');
let CUSTOMERS = [];
let lineCount = 0;

function api(path, opts) {
  opts = opts || {};
  opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if (TOKEN) opts.headers['x-auth-token'] = TOKEN;
  return fetch(path, opts).then(async r => {
    const data = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(data.error || 'Request failed');
    return data;
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 3000);
}

async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    const data = await api('/api/auth/login', { method:'POST', body: JSON.stringify({username,password}) });
    if (data.user.role !== 'salesman' && data.user.role !== 'superadmin') {
      errEl.textContent = 'This page is for sales team accounts.';
      return;
    }
    TOKEN = data.token; USER = data.user;
    localStorage.setItem('horeca_token', TOKEN);
    localStorage.setItem('horeca_user', JSON.stringify(USER));
    initApp();
  } catch(e) { errEl.textContent = e.message; }
}
function doLogout() {
  api('/api/auth/logout', {method:'POST'}).catch(()=>{});
  localStorage.removeItem('horeca_token'); localStorage.removeItem('horeca_user');
  location.reload();
}

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if (name==='status') loadMyOrders();
  if (name==='dispatch') loadDispatchStatus();
  if (name==='notif') loadNotifications();
}

async function initApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  document.getElementById('userLabel').textContent = USER.full_name || USER.username;
  document.getElementById('spName').value = USER.full_name || USER.username;
  await loadCustomers();
  if (!CUSTOMERS.length) showToast('No customers linked to your account — contact admin');
  addLine();
  pollNotifications();
}

async function loadCustomers() {
  try {
    const data = await api('/api/horeca/customers');
    CUSTOMERS = data.customers || [];
  } catch (e) {
    CUSTOMERS = [];
    showToast('Could not load customer list: ' + e.message);
  }
}

function filterCustomers(q) {
  const box = document.getElementById('custResults');
  const query = (q||'').trim().toLowerCase();
  document.getElementById('custSelectedIdx').value = '';
  if (!query) { box.style.display='none'; return; }
  if (!CUSTOMERS.length) { box.innerHTML = '<div class="item-result" style="color:var(--muted);">No customers linked to your account — contact admin</div>'; box.style.display='block'; return; }
  const matches = [];
  CUSTOMERS.forEach((c,i) => {
    if (c.customer_name.toLowerCase().includes(query) || (c.account_number||'').toLowerCase().includes(query)) matches.push(i);
  });
  if (!matches.length) { box.innerHTML = '<div class="item-result" style="color:var(--muted);">No matches found</div>'; box.style.display='block'; return; }
  box.innerHTML = matches.slice(0,50).map(i => {
    const c = CUSTOMERS[i];
    return `<div class="item-result" onclick='selectCustomer(${i})'><b>${c.customer_name}</b><br>${c.account_number}</div>`;
  }).join('');
  box.style.display = 'block';
}

function selectCustomer(idx) {
  const c = CUSTOMERS[idx];
  document.getElementById('custSearch').value = c.customer_name + ' (' + c.account_number + ')';
  document.getElementById('custSelectedIdx').value = idx;
  document.getElementById('custResults').style.display = 'none';
  onCustomerChange();
}

let SELECTED_SITE = null;

function siteDisplayText(s) {
  let t = s.location || 'Site';
  if (s.address_detail) t += ' — ' + s.address_detail;
  if (s.site_use_id) t += ' (' + s.site_use_id + ')';
  return t;
}

function onCustomerChange() {
  const idx = document.getElementById('custSelectedIdx').value;
  const siteWrap = document.getElementById('siteWrap');
  const siteSearch = document.getElementById('siteSearch');
  SELECTED_SITE = null;
  siteSearch.value = '';
  document.getElementById('siteSelectedIdx').value = '';
  if (idx === '') { siteWrap.style.display='none'; return; }
  const cust = CUSTOMERS[idx];
  if (cust.sites.length === 0) { siteWrap.style.display='none'; return; }
  siteWrap.style.display = 'block';
  if (cust.sites.length === 1) {
    SELECTED_SITE = cust.sites[0];
    siteSearch.value = siteDisplayText(cust.sites[0]);
  }
}

function filterSites(q) {
  const idx = document.getElementById('custSelectedIdx').value;
  const box = document.getElementById('siteResults');
  if (idx === '') { box.style.display='none'; return; }
  const cust = CUSTOMERS[idx];
  const query = (q||'').toLowerCase();
  const matches = cust.sites.filter(s => !query || (s.location||'').toLowerCase().includes(query) || (s.address_detail||'').toLowerCase().includes(query) || (s.site_use_id||'').toLowerCase().includes(query));
  if (!matches.length) { box.style.display='none'; return; }
  box.innerHTML = matches.map((s,i)=>{
    const realIdx = cust.sites.indexOf(s);
    return `<div class="item-result" onclick='selectSite(${realIdx})'><b>${s.location||'Site'}</b>${s.address_detail?('<br>'+s.address_detail):''}${s.site_use_id?(' — '+s.site_use_id):''}</div>`;
  }).join('');
  box.style.display = 'block';
}
function selectSite(siteIdx) {
  const idx = document.getElementById('custSelectedIdx').value;
  const cust = CUSTOMERS[idx];
  const site = cust.sites[siteIdx];
  SELECTED_SITE = site;
  document.getElementById('siteSearch').value = siteDisplayText(site);
  document.getElementById('siteResults').style.display = 'none';
}

let itemSearchTimers = {};
function updateLineCounter() {
  const el = document.getElementById('lineCounter');
  if (el) el.textContent = lineCount + ' / 15';
}

function addLine() {
  if (lineCount >= 15) { showToast('Maximum 15 lines per order'); return; }
  lineCount++;
  updateLineCounter();
  const id = 'line'+lineCount+'_'+Date.now();
  const wrap = document.createElement('div');
  wrap.className = 'line-item';
  wrap.id = id;
  wrap.innerHTML = `
    <div class="line-row">
      <div class="line-field">
        <span class="mini-label">Item Code</span>
        <input class="codeInput" placeholder="Search or type code" oninput="searchItem('${id}','code',this.value)" autocomplete="off">
        <div class="item-results codeResults" style="position:absolute; background:var(--card2); border:1px solid var(--border); width:100%; z-index:20; max-height:160px; overflow:auto; border-radius:8px; display:none;"></div>
      </div>
      <button class="btn-danger" onclick="document.getElementById('${id}').remove(); lineCount--; updateLineCounter();">✕</button>
    </div>
    <div class="line-field">
      <span class="mini-label">Description</span>
      <input class="descInput" placeholder="Search or type description" oninput="searchItem('${id}','desc',this.value)" autocomplete="off">
      <div class="item-results descResults" style="position:absolute; background:var(--card2); border:1px solid var(--border); width:100%; z-index:20; max-height:160px; overflow:auto; border-radius:8px; display:none;"></div>
    </div>
    <div class="line-row">
      <div class="line-field field-qty">
        <span class="mini-label">Qty</span>
        <input class="qty" type="number" min="1" placeholder="Qty">
      </div>
      <div class="line-field field-uom">
        <span class="mini-label">UOM</span>
        <select class="uom"><option value="EA">EA</option><option value="CS">CS</option><option value="BNS">BNS</option></select>
      </div>
    </div>
  `;
  document.getElementById('lineList').appendChild(wrap);
}

function searchItem(lineId, field, q) {
  const timerKey = lineId+'_'+field;
  clearTimeout(itemSearchTimers[timerKey]);
  itemSearchTimers[timerKey] = setTimeout(async () => {
    const box = document.querySelector('#'+lineId+' .'+field+'Results');
    if (!q || q.length < 2) { box.style.display='none'; return; }
    try {
      const data = await api('/api/horeca/items?q='+encodeURIComponent(q));
      if (!data.items.length) { box.style.display='none'; return; }
      box.innerHTML = data.items.map(it=>`<div class="item-result" onclick='selectItem("${lineId}", ${JSON.stringify(JSON.stringify(it)).replace(/'/g, "&#39;")})'><b>${it.item_code}</b><br>${(it.description||'').replace(/</g,'&lt;')}</div>`).join('');
      box.style.display = 'block';
    } catch(e) {}
  }, 250);
}
function selectItem(lineId, itemJson) {
  const it = JSON.parse(itemJson);
  const row = document.getElementById(lineId);
  row.querySelector('.codeInput').value = it.item_code;
  row.querySelector('.descInput').value = it.description || '';
  row.querySelector('.codeResults').style.display = 'none';
  row.querySelector('.descResults').style.display = 'none';
}

async function submitOrder() {
  const msgEl = document.getElementById('orderMsg');
  msgEl.textContent = '';
  const custIdx = document.getElementById('custSelectedIdx').value;
  if (custIdx === '') { msgEl.textContent = 'Please select a customer.'; return; }
  const cust = CUSTOMERS[custIdx];
  let site = SELECTED_SITE || { location:null, site_use_id:null };
  if (cust.sites.length > 0 && !SELECTED_SITE) { msgEl.textContent = 'Please select the customer location.'; return; }

  const lines = [];
  document.querySelectorAll('.line-item').forEach(row => {
    const itemCode = row.querySelector('.codeInput').value.trim();
    const description = row.querySelector('.descInput').value.trim();
    const qty = row.querySelector('.qty').value;
    const uom = row.querySelector('.uom').value;
    if (itemCode && qty) lines.push({ item_code: itemCode, description: description, qty: Number(qty), uom });
  });
  if (!lines.length) { msgEl.textContent = 'Add at least one order line.'; return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    const data = await api('/api/horeca/orders', { method:'POST', body: JSON.stringify({
      account_number: cust.account_number,
      customer_name: cust.customer_name,
      site_use_id: site.site_use_id,
      location: site.location,
      po_number: document.getElementById('poNumber').value.trim() || null,
      warehouse: document.getElementById('whCode').value.trim() || 'DCF',
      lines
    })});
    showToast('Order ' + data.order_ref + ' submitted' + (data.warning ? ' — ' + data.warning : ''));
    document.getElementById('lineList').innerHTML = ''; lineCount = 0; addLine();
    document.getElementById('custSearch').value=''; document.getElementById('custSelectedIdx').value=''; document.getElementById('siteWrap').style.display='none';
    document.getElementById('poNumber').value=''; SELECTED_SITE = null;
  } catch(e) {
    msgEl.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Order';
  }
}

async function loadMyOrders() {
  const list = document.getElementById('ordersList');
  list.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const data = await api('/api/horeca/orders/mine');
    if (!data.orders.length) { list.innerHTML = '<div class="empty">No orders yet.</div>'; return; }
    list.innerHTML = data.orders.map(o => `
      <div class="order-card">
        <div class="top"><span class="ref">${o.order_ref}</span><span class="badge ${o.status}">${o.status.toUpperCase()}</span></div>
        <div class="meta">${o.customer_name} · ${new Date(o.created_at).toLocaleString()}</div>
        ${o.lines.map(l=>`<div class="line">${l.item_code} — ${l.qty} ${l.uom}</div>`).join('')}
      </div>
    `).join('');
  } catch(e) { list.innerHTML = '<div class="empty">'+e.message+'</div>'; }
}

async function loadDispatchStatus() {
  const list = document.getElementById('dispatchList');
  list.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const data = await api('/api/horeca/orders/dispatch-status');
    if (!data.orders.length) { list.innerHTML = '<div class="empty">No orders in the last 7 days.</div>'; return; }
    list.innerHTML = data.orders.map(o => {
      let detail = '';
      if (o.dispatch) {
        detail = `<div class="line" style="color:#ffd75e;">Route: ${o.dispatch.route||'-'} · Value: ${o.dispatch.value!=null?o.dispatch.value:'-'} AED${o.dispatch.temperature?' · '+o.dispatch.temperature:''}</div>`;
      } else if (o.backlog) {
        detail = `<div class="line" style="color:#e0b73f;">${o.backlog.count} order(s) in backlog · Value: ${o.backlog.value!=null?Math.round(o.backlog.value):'-'} AED${o.backlog.topCat?' · '+o.backlog.topCat:''}${o.backlog.oldestRSD?' · Oldest RSD: '+o.backlog.oldestRSD:''}</div>`;
      } else {
        detail = `<div class="line" style="color:#ff8a7a;">Not yet seen in dispatch or backlog data.</div>`;
      }
      return `
      <div class="order-card ${o.statusType}">
        <div class="top"><span class="ref">${o.order_ref}</span><span class="badge ${o.statusType}">${o.statusLabel}</span></div>
        <div class="meta">${o.customer_name}${o.po_number?' · PO '+o.po_number:''} · ${new Date(o.created_at).toLocaleString()}</div>
        ${detail}
      </div>`;
    }).join('');
  } catch(e) { list.innerHTML = '<div class="empty">'+e.message+'</div>'; }
}

async function loadNotifications() {
  const list = document.getElementById('notifList');
  list.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const data = await api('/api/horeca/notifications');
    document.getElementById('notifDot').style.display = 'none';
    document.getElementById('notifDotHeader').style.display = 'none';
    if (!data.notifications.length) { list.innerHTML = '<div class="empty">No notifications.</div>'; return; }
    list.innerHTML = data.notifications.map(n => `
      <div class="order-card">
        <div class="meta">${new Date(n.created_at).toLocaleString()}</div>
        <div class="line">${n.message}</div>
      </div>
    `).join('');
    data.notifications.filter(n=>!n.read).forEach(n => api('/api/horeca/notifications/'+n.id+'/read', {method:'POST'}).catch(()=>{}));
  } catch(e) { list.innerHTML = '<div class="empty">'+e.message+'</div>'; }
}

async function pollNotifications() {
  try {
    const data = await api('/api/horeca/notifications');
    if (data.notifications.some(n=>!n.read)) { document.getElementById('notifDot').style.display = 'block'; document.getElementById('notifDotHeader').style.display = 'block'; }
  } catch(e) {}
  setTimeout(pollNotifications, 60000);
}

if (TOKEN && USER) { initApp(); }
